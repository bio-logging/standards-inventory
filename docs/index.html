<script type="application/json" data-for="htmlwidget-469589b39fb79a19bdfc">{"x":{"filter":"none","vertical":false,"caption":"<caption style=\"caption-side: top; text-align: left;\">This inventory compiles information about community initiatives are working towards data standardization and interoperability in bio-logging science and practice. It is managed by the Data Standardization Working Group of the International Bio-Logging Society (https://bio-logging.net/wg/data-standardisation).<\/caption>","data":[["AfriMove","Animal Borne Ocean Sensors (AniBOS)","Australia's IMOS Animal Tracking Facility","Biologging intelligent Platform","Blue Corridors","COVID-19 Bio-logging Initiative","Euromammals","European Tracking Network (ETN)","Global Biodiversity Information Facility (GBIF)","Global Shark Movement Project","Global Tagging of Pelagic Predators (GTOPP)","Global Wader","Great Lakes Acoustic Telemetry Observation System","Machine Observations Interest Group","Marine Megafauna Movement (MegaMove)","Motus Wildlife Tracking System","Move BON","MoveApps","Movebank","Movebank Attribute Dictionary","movepub R package","MoveTraits","OBIS SEAMAP","Ocean Biodiversity Information System (OBIS)","Ocean Tracking Network","OCEARCH","Reporting standards to promote animal welfare and data quality in biologging research","Seabird Tracking Database","SEATRACK","Standardization framework for bio-logging data","The Shorebird Science and Conservation Collective","U.S. Animal Telemetry Network","Unique Animal IDs","Wild Moves","Wireless Remote Animal Monitoring (WRAM)"],["Okavango Research Institute, University of Botswana","Global Ocean Observing System","University of Tasmania","University of Tokyo",null,"International Bio-Logging Society","Fondazione Edmund Mach","Flanders Marine Institute (VLIZ)","GBIF Secretariat","Marine Biological Association Laboratory",null,"International Wader Study Group, University of Iceland","Great Lakes Fishery Commission","Taxonomic Databases Working Group & Biodiversity Information Standards (TDWG)","Australian National University","Birds Canada","Group on Earth Observations Biodiversity Observation Network (GEO BON)","Max Planck Institute of Animal Behavior","Max Planck Institute of Animal Behavior","Max Planck Institute of Animal Behavior","Research Institute for Nature and Forest (INBO)","Senckenberg Society for Nature Research","Duke University, Marine Geospatial Ecology Lab","OBIS Secretariat","Ocean Tracking Network (OTN)",null,"University of California, Santa Cruz","BirdLife International","Norwegian Polar Institute, Norwegian Institute of Nature Research",null,"The Shorebird Science and Conservation Collective, Smithsonian Migratory Bird Center","U.S. Integrated Ocean Observing System","Max Planck Institute of Animal Behavior","WILDLABS","Swedish University of Agricultural Sciences (SLU)"],["Emily Bennitt",null,"Rob Harcourt, Emma Bowen","Katsufumi Sato",null,"Federico Ossi","Francesca Cagnacci","Jan Reubes, Claudia Meneses","Tim Robertson",null,"Barbara Block","José Alves",null,"Peggy Newman","Ana Sequeira","Stuart Mackenzie and Catherine Jardine","Lacey Hughey","Anne Scharf","Sarah Davidson","Sarah Davidson","Peter Desmet","Larissa Beumer, Anne Hertel, Thomas Mueller",null,"Ward Appeltans","Robert Lennox",null,"Allison Payne",null,"Benjamin Merkel","Ana Sequeira","Allie Anderson (Quantitative Ecologist) and Autumn-Lynn Harrison (PI)","Megan McKinzie","Martin Wikelski",null,"Petter Lundberg"],["ebennitt at ub.ac.bw","anibos.ocean at gmail.com","robert.harcourt at mq.edu.au, emma.bowen at sims.org.au","katsu at aori.u-tokyo.ac.jp","https://bluecorridors.org/contact","covid19.biologging.initiative at gmail.com","francesca.cagnacci at fmach.it","jan.reubes at vliz.be, claudia.meneses at vliz.be","trobertson at gbif.org","https://www.globalsharkmovement.org/contact","bblock at stanford.edu","globalwader at waderstudygroup.org","GLATOSWeb at GLFC.org","peggydnewman at gmail.com","ana at megamove.org",null,"hugheyl at si.edu","support at moveapps.org","support at movebank.org","sdavidson at ab.mpg.de","peter.desmet at inbo.be","movetraits at gmail.com","https://seamap.env.duke.edu/contact-us","w.appeltans at unesco.org",null,"info at ocearch.org","alrpayne at ucsc.edu","seabirds at birdlife.org","benjamin.merkel at npolar.no","ana.sequeira at uwa.edu.au","HarrisonAL at si.edu, AndersonA at si.edu","mmckinzie at mbari.org","wikelski at ab.mpg.de","ibls.datastandards at gmail.com","petter.lundberg at slu.se"],["AfriMove is a collaborative database and network for GPS tracking data and associated information collected from animals in Africa, based on the EuroMammals framework. We aim to bring together people and data to allow large scale analyses and collaborations with conservation outcomes.","Animal Borne Ocean Sensors (AniBOS) is a network of the Global Ocean Observing System (GOOS), providing oceanographic measurements collected through bio-logging. The goals of the project are to disseminate standardized, in situ physical and biogeochemical oceanographic data, and to improve understanding of animal responses to environmental variability and change through integration with GOOS. Read more in McMahon et al. (2021, https://doi.org/10.3389/fmars.2021.751840)","Australia's Integrated Marine Observing System (IMOS) Ocean Data Network includes data collections for Acoustic Telemetry, which uses a continental-scale array of strategically placed underwater acoustic receivers and a central data repository to monitor and track broad-scale movements of tagged animals, and Animal Tagging, which deploys satellite-relayed transmitters equipped with miniaturised oceanographic sensors on marine species (i.e. seals, and sea turtles ) to collect behavioural (movements, dive behaviour) and physical (depth, temperature and salinity) data.","Using a fund from \"Application of big data of marine life (program manager Tom Akamatsu)\" by the Ministry of Education, Culture, Sports, Science and Technology, Japan, we have established a new biologging data base \"Biologging intelligent Platform\". BiP can accept various parameters not only horizontal position, but also behavioral data such as diving depth, flight altitude, speed, and acceleration, as well as physiological data such as body temperature, along with related metadata. BiP standardizes the information to facilitate secondary data analysis. A unique feature of BiP is the Online Analytical Processing (OLAP) tools that calculate environmental parameters, such as surface currents, ocean winds, and waves from data collected by animals. To enhance data accessibility, BiP allows users to search for datasets using the DOI of the paper in which the data was used.","The Blue Corridors initiative is a global multidisciplinary collaboration that is integrating satellite telemetry data for whales and dolphins to map movements, identify threats, and develop conservation strategies.","In 2020, the International Bio-Logging Society, together with several partner organizations, launched the COVID-19 Bio-Logging Initiative, to investigate how wildlife responded to altered levels of human mobility during the COVID-19 pandemic. The goal of the Initiative is to use bio-logging data collected before, during, and after lockdowns to advance our understanding of human–wildlife interactions and inform global conservation efforts.","EuroMammals is a 15 yrs old bottom-up collaborative project on spatial ecology of European terrestrial mammals. See euromammals.org","The European Tracking Network is a pan-European network uniting researchers working (primarily) on acoustic telemetry, providing, e.g., a centralized database and working towards compatibility of research equipment and establishing data flows of open-access aquatic tracking data into Digital Twin of the Ocean initiatives.","GBIF is an international network and data infrastructure funded by the world's governments and aimed at providing free and open access to biodiversity data. GBIF accepts biologging data published in the Darwin Core standard, allowing it to be more widely discovered and used in combination with other species occurrence data.","The Global Shark Movement Project is an international scientific research project bringing together shark research teams across countries and institutions. The project assembles shark tracking and environmental data and experts to advance scientific knowledge of shark behaviour, ecology, conservation and fisheries science to inform improved management of threatened sharks and ocean biodiversity.","Global Tagging of Pelagic Predators (GTOPP) is an international, multidisciplinary collaboration that compiles tracking data from migratory marine species and connects them to oceanographic datasets to improve understanding of animal behavior and offer tools to improve conservation efforts.","Global Wader is a community-led initiative aiming to provide a definitive register of all wader/shorebird tracking projects currently underway or completed. The project has three main purposes: (1) maintain an up-to-date register of all wader tracking projects currently undertaken; (2) encourage best practices in the long-term storage of tracking data, including the use of specialist repositories via a partnership with Movebank; (3) facilitate collaborations between trackers, scientists and conservationists, including promoting open access to data, and facilitating data-sharing where appropriate, particularly for efforts towards the conservation of these species.","The Great Lakes Acoustic Telemetry Observation System (GLATOS) is a bi-national network of researchers using acoustic telemetry to understand fish behavior and inform fisheries management, and support public engagement. GLATOS also connects acoustic telemetry researchers and their projects, and supports equipment and data sharing within the Great Lakes basin.","This group is aims to (1) oversee Task Groups that document common approaches for data exchange formats for machine observations; (2) provide a point of contact and facilitate discussion on modelling machine observation scenarios, including bio-logging, and (3) serve as point of contact and facilitate discussion on publishing machine observations in biodiversity infrastructures like GBIF and OBIS. Currently machine observation data tend to be housed outside these infrastructures, leaving them undiscoverable and left out of the larger biodiversity record.","The Marine Megafauna Movement (MegaMove) is a team of scientists who collect marine megafauna tracking data and compile these data with the aim to inform the conservation of marine megafauna.","The Motus Wildlife Tracking System (Motus) is an international collaborative research network that uses coordinated automated radio telemetry to facilitate research and education on the ecology and conservation of migratory animals. Motus is a program of Birds Canada in partnership with collaborating researchers and organizations.","The Biodiversity Observation Network for Animal Movement is (Move BON) is a thematic BON, part of GEO BON. Goals of the BON are to enhance the science-policy pipeline for animal movement data, coordinate with existing initiatives, derive actionable biodiversity indices at national and global scales, and operationalize solutions for incorporating these insights into decision making.","MoveApps is an open analysis platform for animal tracking data. Users build workflows in a code-free, flexible environment, using open-source apps contributed by a growing community of developers. It runs on a serverless cloud computing system, allowing automated and sharable data processing worldwide. Read more in Kölzsch et al. (2022, https://doi.org/10.1186/s40462-022-00327-4).","Movebank is an online platform helping thousands of researchers and wildlife managers worldwide to manage, share, analyze and archive animal tracking and other animal-borne sensor data. The platform includes a suite of tools and services leveraging a shared database. Data owners harmonize data from live feeds and archived files with contextual metadata, and can share data publicly or with trusted collaborators. The public can discover researchers and data, and automate downstream processes that access data. Movebank offers a formal archiving service that issues DOIs to support data sharing requirements.","The attributes used in Movebank are available as a persistent, machine-readable vocabulary, hosted on the British Oceanographic Data Centre's Natural Environment Research Council NERC Vocabulary Server at vocab.nerc.ac.uk/collection/MVB. The vocabulary has been built over time with input from hundreds of researchers and tag manufacturers, is used by initiatives, software applicatons and tag manufacturers to offer consistent, transparent data reading, processing and storage.","Movepub is an R package to prepare animal tracking data from Movebank for publication in a research repository. With movepub you can document data with metadata following the Data Package standard and transform these to Darwin Core and Ecological Metadata Language (EML) for publication to the GBIF and OBIS. Read more in van der Kolk et al. (2022, https://doi.org/10.3897/zookeys.1123.90623).","The MoveTraits Initiative is a team of researchers developing standardized movement and behavioral metrics—movement traits—calculated using harmonized data and opens-source protocols, and publishing them in the MoveTraits database. The goals of the Initiative are to better integrate animal behavior into ecological research, make information contained in tracking data more accessible, and contribute to conservation policy. Read more in Beumer et al. (2025, https://doi.org/10.1111/ele.70297).","The Ocean Biodiversity Information System Spatial Ecological Analysis of Megavertebrate Animal Populations (OBIS-SEAMAP) is an online database and mapping tool for tracking data from marine mammals, sea turtles, seabirds and sharks. It aims to improve understanding of the distribution and ecology of these species. It is a thematic node of OBIS and a project under IOC-UNESCO's International Oceanographic Data and Information Exchange.","OBIS is an international network and data infrastructure to provide access to the world’s ocean biodiversity and biogeographic data. It is a project under the Intergovernmental Oceanographic Commission (IOC) of UNESCO. OBIS accepts biologging data published in the Darwin Core standard, allowing it to be more widely discovered and used in combination with other species occurrence data.","The Ocean Tracking Network (OTN) is a global aquatic research, data management and partnership platform headquartered at Dalhousie University in Halifax, Nova Scotia, Canada. OTN's mission is to inform the stewardship and sustainable management of aquatic animals by providing knowledge on their movements, habitats and survival in the face of changing global environments.","OCEARCH is a global non-profit organization conducting research, education, outreach and conservation efforts. They lead collaborative field expeditions to track marine apex predators, integrating the collected data for public outreach and research.","We have described a minimum reporting standard for instrument characteristics to facilitate future meta-analyses on the impacts of biologging instruments on animal welfare and data quality.","The BirdLife International Seabird Tracking Database is a central store for seabird tracking data from around the world and aims to help further seabird conservation work and support the tracking community.","SEATRACK aims to map the non-breeding distribution of seabirds breeding in colonies encircling the North Atlantic. We mainly use geolocators and have developed a standardised data procedure and a centralised database to ensure data integrity and traceability. Further, the project builds on an agreement of understanding between all partners as well as a science plan and a data request form.","The standardisation framework for bio-logging data provides templates, code and examples to document, store and process bio-logging datasets. These include device and deployment metadata and sensor data at four levels: decoded sensor data, curated data, interpolated data, and gridded data. Read more in Sequeira et al. (2021, https://doi.org/10.1111/2041-210X.13593).","The Shorebird Science and Conservation Collective brings together the knowledge of agencies, universities, nonprofits, and community scientists to advance shorebird conservation in the Western Hemisphere through the sharing of shorebird tracking data. To date, over 7 million locations from >3,000 individual tracked shorebirds of 36 species have been shared by over 88 organizations, cleaned, and integrated into a central resource to inform on-the-ground conservation projects. Read more about the Collective at https://www.biorxiv.org/content/10.1101/2024.01.30.576574v3.","Operating under the NOAA Integrated Ocean Observing System (IOOS), the multi-agency U.S. Animal Telemetry Network was developed in 2016 to provide unity, stability and continuity to the national infrastructure that facilitates the collection, management, standarization and availability of marine animal telemetry data derived through satellite, archival and acoustic tags and seeks to promote the integration of these data into our nation's ocean observing system cabapilities.","The Movebank Life History Museum (MoMu) and Unique Animal Identifier (UAID) support storage of files related to tracked wildlife and the assignment of persistent and unique identifiers for individual animals. The goal is to manage and archive the range of multi-media information about individuals throughout their lives—for example, from photographs, text messages and news articles—collected as more animals for longer using attached tags. As more projects are shared and archived, UAIDs offer a way to link information about individual animals across databases to enable future efforts to bring together data globally. Read more in Wikelski et al. (2024, https://doi.org/10.1111/2041-210X.14407).","Wild Moves is a GBIF-hosted portal for animal tracking and bio-logging data maintained by WILDLABS. To participate, institutions and data platforms can publish data to GBIF and assign it to the \"Wild Moves\" network. Tracking data platforms are coordinating software development to represent harmonized animal tracking data in Darwin Core, the data standard used by GBIF and OBIS. With further adoption, Wild Moves can serve as a global, public data and meta-repository for tracking data and projects.","SLU Wireless Remote Animal Monitoring (WRAM) is a national e-infrastructure for biologging and tracking, designed to support project management, data collection, storage, and visualization. Initiated in the early 2000s, WRAM currently holds data on nearly 6,000 individuals across 24 different species. It is also a core component of the Swedish Biodiversity Data Infrastructure (SBDI)—Sweden’s GBIF node and the largest biodiversity database in the country, aggregating data from a wide range of sources. WRAM is designed to accommodate both spatial and non-spatial data, supporting a broad range of research and monitoring efforts. Ongoing developments focus on improving the database’s performance and interoperability, including the implementation of the within SBDI-developed biologging sensor data model (https://github.com/biodiversitydata-se/biologging-sensor-datamodel). This integration aims to enhance the handling of metadata and promote standardized, efficient data management across platforms."],["<a href=\"https://euromammals.org/afrimove/\">https://euromammals.org/afrimove/<\/a>","<a href=\"https://anibos.com\">https://anibos.com<\/a>","<a href=\"https://imos.org.au/facility/animal-tracking\">https://imos.org.au/facility/animal-tracking<\/a>","<a href=\"https://www.bip-earth.com/\">https://www.bip-earth.com/<\/a>","<a href=\"https://bluecorridors.org\">https://bluecorridors.org<\/a>","<a href=\"https://bio-logging.net/wg/covid19-biologging\">https://bio-logging.net/wg/covid19-biologging<\/a>","<a href=\"https://www.euromammals.org\">https://www.euromammals.org<\/a>","<a href=\"https://europeantrackingnetwork.org\">https://europeantrackingnetwork.org<\/a>","<a href=\"https://www.gbif.org\">https://www.gbif.org<\/a>","<a href=\"https://www.globalsharkmovement.org\">https://www.globalsharkmovement.org<\/a>","<a href=\"https://gtopp.org\">https://gtopp.org<\/a>","<a href=\"https://www.globalwader.org\">https://www.globalwader.org<\/a>","<a href=\"https://glatos.org\">https://glatos.org<\/a>","<a href=\"https://www.tdwg.org/community/mobs\">https://www.tdwg.org/community/mobs<\/a>","<a href=\"https://megamove.org\">https://megamove.org<\/a>","<a href=\"https://motus.org\">https://motus.org<\/a>","<a href=\"https://geobon.org/move-bon\">https://geobon.org/move-bon<\/a>","<a href=\"https://moveapps.org\">https://moveapps.org<\/a>","<a href=\"https://www.movebank.org\">https://www.movebank.org<\/a>","<a href=\"https://vocab.nerc.ac.uk/collection/MVB\">https://vocab.nerc.ac.uk/collection/MVB<\/a>","<a href=\"https://github.com/inbo/movepub\">https://github.com/inbo/movepub<\/a>","<a href=\"https://www.movebank.org/cms/movebank-content/movetraits\">https://www.movebank.org/cms/movebank-content/movetraits<\/a>","<a href=\"https://seamap.env.duke.edu\">https://seamap.env.duke.edu<\/a>","<a href=\"https://obis.org\">https://obis.org<\/a>","<a href=\"https://oceantrackingnetwork.org\">https://oceantrackingnetwork.org<\/a>","<a href=\"https://www.ocearch.org\">https://www.ocearch.org<\/a>","<a href=\"https://doi.org/10.1186/s40317-025-00438-w\">https://doi.org/10.1186/s40317-025-00438-w<\/a>","<a href=\"https://data.seabirdtracking.org\">https://data.seabirdtracking.org<\/a>","<a href=\"https://seatrack.net\">https://seatrack.net<\/a>","<a href=\"https://github.com/ocean-tracking-network/biologging_standardization\">https://github.com/ocean-tracking-network/biologging_standardization<\/a>","<a href=\"https://nationalzoo.si.edu/migratory-birds/shorebird-collective\">https://nationalzoo.si.edu/migratory-birds/shorebird-collective<\/a>","<a href=\"https://atn.ioos.us\">https://atn.ioos.us<\/a>","<a href=\"https://animaltracker.app\">https://animaltracker.app<\/a>","<a href=\"https://moves.wildlabs.net\">https://moves.wildlabs.net<\/a>","<a href=\"https://wram.slu.se\">https://wram.slu.se<\/a>"],["collaborative initiative","derived data product","data platform","data platform","collaborative initiative","collaborative initiative","data platform","data platform","data platform","collaborative initiative","collaborative initiative","collaborative initiative","collaborative initiative","data standards","collaborative initiative","data platform","collaborative initiative","analysis tool","data platform","data vocabulary","analysis tool","derived data product","data platform","data platform","data platform","collaborative initiative","reporting standard","data platform","collaborative initiative","reporting standard, data vocabulary","collaborative initiative","data platform","data platform","derived data product, data platform","data platform"]],"container":"<table class=\"display\">\n  <thead>\n    <tr>\n      <th>Project<\/th>\n      <th>Lead Organization<\/th>\n      <th>Contact Name<\/th>\n      <th>Contact Address<\/th>\n      <th>Description<\/th>\n      <th>Website<\/th>\n      <th>Tags<\/th>\n    <\/tr>\n  <\/thead>\n<\/table>","options":{"pageLength":50,"scrollX":true,"autoWidth":true,"columnDefs":[{"name":"Project","targets":0},{"name":"Lead Organization","targets":1},{"name":"Contact Name","targets":2},{"name":"Contact Address","targets":3},{"name":"Description","targets":4},{"name":"Website","targets":5},{"name":"Tags","targets":6}],"order":[],"orderClasses":false}},"evals":[],"jsHooks":[]}</script>

    // flash "checked"
    button.classList.add('code-copy-button-checked');

      if (tooltip) {
        tooltip.hide();

      arrow: false,
      appendTo: function(el) {
          return el.parentElement;
      },
      interactive: true,
      interactiveBorder: 10,
      theme: 'quarto',
      placement: 'bottom-start'
    };
    window.tippy(el, config); 
  }
  const noterefs = window.document.querySelectorAll('a[role="doc-noteref"]');
  for (var i=0; i<noterefs.length; i++) {
    const ref = noterefs[i];
    tippyHover(ref, function() {
      // use id or data attribute instead here
      let href = ref.getAttribute('data-footnote-href') || ref.getAttribute('href');
      try { href = new URL(href).hash; } catch {}
      const id = href.replace(/^#\/?/, "");
      const note = window.document.getElementById(id);
      return note.innerHTML;
    });
  }
      let selectedAnnoteEl;
      const selectorForAnnotation = ( cell, annotation) => {
        let cellAttr = 'data-code-cell="' + cell + '"';
        let lineAttr = 'data-code-annotation="' +  annotation + '"';
        const selector = 'span[' + cellAttr + '][' + lineAttr + ']';
        return selector;
      }
      const selectCodeLines = (annoteEl) => {
        const doc = window.document;
        const targetCell = annoteEl.getAttribute("data-target-cell");
        const targetAnnotation = annoteEl.getAttribute("data-target-annotation");
        const annoteSpan = window.document.querySelector(selectorForAnnotation(targetCell, targetAnnotation));
        const lines = annoteSpan.getAttribute("data-code-lines").split(",");
        const lineIds = lines.map((line) => {
          return targetCell + "-" + line;
        })
        let top = null;
        let height = null;
        let parent = null;
        if (lineIds.length > 0) {
            //compute the position of the single el (top and bottom and make a div)
            const el = window.document.getElementById(lineIds[0]);
            top = el.offsetTop;
            height = el.offsetHeight;
            parent = el.parentElement.parentElement;
          if (lineIds.length > 1) {
            const lastEl = window.document.getElementById(lineIds[lineIds.length - 1]);
            const bottom = lastEl.offsetTop + lastEl.offsetHeight;
            height = bottom - top;
          }
          if (top !== null && height !== null && parent !== null) {
            // cook up a div (if necessary) and position it 
            let div = window.document.getElementById("code-annotation-line-highlight");
            if (div === null) {
              div = window.document.createElement("div");
              div.setAttribute("id", "code-annotation-line-highlight");
              div.style.position = 'absolute';
              parent.appendChild(div);
            }
            div.style.top = top - 2 + "px";
            div.style.height = height + 4 + "px";
            let gutterDiv = window.document.getElementById("code-annotation-line-highlight-gutter");
            if (gutterDiv === null) {
              gutterDiv = window.document.createElement("div");
              gutterDiv.setAttribute("id", "code-annotation-line-highlight-gutter");
              gutterDiv.style.position = 'absolute';
              const codeCell = window.document.getElementById(targetCell);
              const gutter = codeCell.querySelector('.code-annotation-gutter');
              gutter.appendChild(gutterDiv);
            }
            gutterDiv.style.top = top - 2 + "px";
            gutterDiv.style.height = height + 4 + "px";
          }
          selectedAnnoteEl = annoteEl;
        }
      };
      const unselectCodeLines = () => {
        const elementsIds = ["code-annotation-line-highlight", "code-annotation-line-highlight-gutter"];
        elementsIds.forEach((elId) => {
          const div = window.document.getElementById(elId);
          if (div) {
            div.remove();
          }
        });
        selectedAnnoteEl = undefined;
      };
      // Attach click handler to the DT
      const annoteDls = window.document.querySelectorAll('dt[data-target-cell]');
      for (const annoteDlNode of annoteDls) {
        annoteDlNode.addEventListener('click', (event) => {
          const clickedEl = event.target;
          if (clickedEl !== selectedAnnoteEl) {
            unselectCodeLines();
            const activeEl = window.document.querySelector('dt[data-target-cell].code-annotation-active');
            if (activeEl) {
              activeEl.classList.remove('code-annotation-active');
            }
            selectCodeLines(clickedEl);
            clickedEl.classList.add('code-annotation-active');
          } else {
            // Unselect the line
            unselectCodeLines();
            clickedEl.classList.remove('code-annotation-active');
          }
        });
      }
  const findCites = (el) => {
    const parentEl = el.parentElement;
    if (parentEl) {
      const cites = parentEl.dataset.cites;
      if (cites) {
        return {
          el,
          cites: cites.split(' ')
        };
      } else {
        return findCites(el.parentElement)
      }
    } else {
      return undefined;
    }
  };
  var bibliorefs = window.document.querySelectorAll('a[role="doc-biblioref"]');
  for (var i=0; i<bibliorefs.length; i++) {
    const ref = bibliorefs[i];
    const citeInfo = findCites(ref);
    if (citeInfo) {
      tippyHover(citeInfo.el, function() {
        var popup = window.document.createElement('div');
        citeInfo.cites.forEach(function(cite) {
          var citeDiv = window.document.createElement('div');
          citeDiv.classList.add('hanging-indent');
          citeDiv.classList.add('csl-entry');
          var biblioDiv = window.document.getElementById('ref-' + cite);
          if (biblioDiv) {
            citeDiv.innerHTML = biblioDiv.innerHTML;
          }
          popup.appendChild(citeDiv);
        });
        return popup.innerHTML;
      });
    }
  }
});
</script>
